<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">TopTeacher! logo</title>
  <desc id="desc">A wide playful TopTeacher wordmark with comic lettering, a top badge, a check mark, and a pencil-shaped exclamation mark.</desc>
  <defs>
    <filter id="soft-shadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#172033" flood-opacity=".18"/>
    </filter>
    <linearGradient id="top-fill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffde59"/>
      <stop offset=".55" stop-color="#ff7a59"/>
      <stop offset="1" stop-color="#e84b8a"/>
    </linearGradient>
    <linearGradient id="teacher-fill" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22b8cf"/>
      <stop offset=".4" stop-color="#4dabf7"/>
      <stop offset=".72" stop-color="#845ef7"/>
      <stop offset="1" stop-color="#f06595"/>
    </linearGradient>
  </defs>

  <g filter="url(#soft-shadow)">
    <path d="M41 89c-10-11-10-32 2-44 30-30 108-37 137-15 18 14 16 43-5 56-34 22-128 25-154 3Z" fill="#263238"/>
    <path d="M48 80c-7-8-7-23 2-31 25-24 94-30 117-12 13 10 11 29-4 39-28 18-94 20-115 4Z" fill="url(#top-fill)"/>
    <text x="81" y="67" fill="#fff8d6" font-family="Arial Black, Impact, sans-serif" font-size="43" font-weight="900" letter-spacing="1" transform="rotate(-7 112 57)">TOP</text>

    <path d="M70 134c90 25 334 26 487 7" fill="none" stroke="#ffd43b" stroke-linecap="round" stroke-width="17"/>
    <path d="M71 134c91 19 334 20 488 5" fill="none" stroke="#1e293b" stroke-linecap="round" stroke-width="4" opacity=".45"/>

    <text x="96" y="126"
          fill="#1e293b"
          font-family="Arial Black, Impact, sans-serif"
          font-size="84"
          font-weight="900"
          stroke="#1e293b"
          stroke-linejoin="round"
          stroke-width="18">Teacher</text>
    <text x="96" y="126"
          fill="url(#teacher-fill)"
          font-family="Arial Black, Impact, sans-serif"
          font-size="84"
          font-weight="900"
          stroke="#ffffff"
          stroke-linejoin="round"
          stroke-width="8">Teacher</text>
    <text x="96" y="126"
          fill="url(#teacher-fill)"
          font-family="Arial Black, Impact, sans-serif"
          font-size="84"
          font-weight="900">Teacher</text>

    <path d="M520 48 542 67 501 114 483 93Z" fill="#37b24d" stroke="#1e293b" stroke-linejoin="round" stroke-width="9"/>
    <path d="M520 48 542 67 501 114 483 93Z" fill="none" stroke="#ebfbee" stroke-linejoin="round" stroke-width="4"/>

    <g transform="rotate(8 578 86)">
      <path d="M576 31h35l-5 87h-25Z" fill="#ff922b" stroke="#1e293b" stroke-linejoin="round" stroke-width="8"/>
      <path d="M576 31h35l-8-18h-20Z" fill="#fff3bf" stroke="#1e293b" stroke-linejoin="round" stroke-width="8"/>
      <path d="M583 13h20l-10-9Z" fill="#1e293b"/>
      <path d="M581 118h25l-3 18h-19Z" fill="#e64980" stroke="#1e293b" stroke-linejoin="round" stroke-width="8"/>
      <circle cx="593" cy="157" r="13" fill="#1e293b"/>
      <path d="M588 42v70" stroke="#ffd8a8" stroke-linecap="round" stroke-width="6" opacity=".8"/>
    </g>

    <path d="M198 26 205 39 219 41 209 51 211 65 198 58 185 65 187 51 177 41 191 39Z" fill="#ffd43b" stroke="#1e293b" stroke-linejoin="round" stroke-width="5"/>
    <path d="M430 23c3 15 10 23 26 27-16 4-24 12-29 27-4-15-12-23-27-27 15-4 23-12 30-27Z" fill="#ff6b6b" stroke="#1e293b" stroke-linejoin="round" stroke-width="5"/>
    <circle cx="55" cy="126" r="9" fill="#4dabf7" stroke="#1e293b" stroke-width="5"/>
  </g>
</svg>

<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title th:text="'Erwartungshorizont - ' + ${model.pupilDisplayName()}">Erwartungshorizont</title>
    <style>
        @page {
            size: A5 portrait;
            margin: 10mm;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: #111;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10.5pt;
            line-height: 1.3;
        }

        .tt-export-document {
            max-width: 148mm;
            margin: 0 auto;
            padding: 10mm;
        }

        .tt-export-topline {
            border-collapse: collapse;
            width: 100%;
            font-weight: 700;
            margin-bottom: 2mm;
            white-space: nowrap;
        }

        .tt-export-topline td {
            padding: 0 6mm 0 0;
            vertical-align: bottom;
        }

        .tt-export-topline td:last-child {
            padding-right: 0;
        }

        .tt-export-topline-title {
            width: 100%;
        }

        .tt-name-line {
            border-bottom: 1px solid #111;
            min-height: 1.15em;
            min-width: 38mm;
        }

        .tt-export-info-box,
        .tt-summary-table,
        .tt-notes,
        .tt-grade-scale {
            border-collapse: collapse;
            width: 100%;
        }

        .tt-export-info-box {
            border: 1px solid #111;
            margin-bottom: 4mm;
        }

        .tt-export-info-box th {
            background: #ececec;
            font-weight: 700;
            text-align: center;
            padding: 1mm 2mm;
        }

        .tt-export-info-box td {
            padding: 0.8mm 2mm;
        }

        h2,
        h3,
        h4 {
            margin: 0;
            font-size: 1em;
        }

        .tt-part {
            margin-top: 5mm;
        }

        .tt-category {
            margin-top: 5mm;
        }

        .tt-category-description {
            margin-top: 1mm;
        }

        .tt-task {
            margin-top: 4mm;
            page-break-inside: avoid;
        }

        .tt-eh-table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 2mm;
            table-layout: fixed;
        }

        .tt-eh-table th,
        .tt-eh-table td {
            border: 1px solid #111;
            padding: 1.2mm 1.5mm;
            vertical-align: top;
        }

        .tt-eh-table th {
            font-weight: 700;
            text-align: left;
        }

        .tt-number-column {
            text-align: center;
            width: 9mm;
        }

        .tt-points-column {
            text-align: center;
            width: 17mm;
            vertical-align: middle;
        }

        .tt-description-column {
            width: auto;
        }

        .tt-requirement-text p {
            margin: 0 0 1mm;
        }

        .tt-requirement-text p:last-child {
            margin-bottom: 0;
        }

        .tt-requirement-text ul,
        .tt-requirement-text ol {
            margin: 1mm 0 0;
            padding-left: 7mm;
        }

        .tt-requirement-text li {
            margin: 0.8mm 0;
        }

        .tt-comment {
            margin-top: 1.5mm;
            color: #444;
            font-size: 0.92em;
        }

        .tt-sum-row td {
            font-weight: 700;
        }

        .tt-summary {
            margin-top: 5mm;
        }

        .tt-summary-table {
            margin-top: 2mm;
        }

        .tt-summary-table td {
            border: 2px solid #111;
            padding: 1.2mm 1.5mm;
            font-weight: 700;
        }

        .tt-summary-table .tt-points-column {
            width: 22mm;
        }

        .tt-notes-section {
            margin-top: 7mm;
        }

        .tt-notes th,
        .tt-notes td {
            border: 1px solid #111;
            padding: 1.5mm;
            text-align: left;
        }

        .tt-notes th {
            font-weight: 700;
        }

        .tt-notes td {
            min-height: 16mm;
        }

        .tt-grade-scale-section {
            margin: 8mm auto 0;
            width: 70%;
        }

        .tt-grade-scale-caption {
            font-weight: 700;
            margin-bottom: 2mm;
            text-align: center;
        }

        .tt-grade-scale th,
        .tt-grade-scale td {
            border: 1px solid #111;
            padding: 1mm 1.5mm;
            text-align: center;
        }

        .tt-grade-scale th {
            background: #ececec;
        }
    </style>
</head>
<body>
<main class="tt-export-document">
    <div th:replace="~{export/fragments/eh-header.thymeleaf.html :: header(${model})}"></div>
    <div th:replace="~{export/fragments/eh-body.thymeleaf.html :: ehBody(${model.parts()})}"></div>
    <div th:replace="~{export/fragments/eh-summary.thymeleaf.html :: summary(${model})}"></div>
    <div th:replace="~{export/fragments/eh-notes.thymeleaf.html :: notes(${model.noteSections()})}"></div>
    <div th:replace="~{export/fragments/grading-scale.thymeleaf.html :: gradingScale(${model})}"></div>
</main>
</body>
</html>
